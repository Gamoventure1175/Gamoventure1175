<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="260" viewBox="0 0 1280 260" role="img" aria-labelledby="practice-strip-title practice-strip-description">
  <title id="practice-strip-title">Things I enjoy outside software</title>
  <desc id="practice-strip-description">Three animated panels show a six-colour speedcube moving from scrambled to solved, keyboard keys tapping at a fast pace alongside 90 plus words per minute, and a blue gateway opening before a warm-gold gateway for Portal, a favourite game worth replaying.</desc>

  <style>
    .paper { fill: #f7f7f4; }
    .grid { fill: none; stroke: #e1e3de; stroke-width: 1; }
    .panel { fill: #fbfbf8; stroke: #8a908c; stroke-width: 1; }
    .key { fill: #f0f1ed; stroke: #8a908c; stroke-width: 1; }
    .ink-fill { fill: #1b1e1c; }
    .ink-stroke { fill: none; stroke: #1b1e1c; }
    .muted-fill { fill: #68706b; }
    .muted-stroke { fill: none; stroke: #68706b; }
    .accent-fill { fill: #5e786f; }
    .accent-stroke { fill: none; stroke: #5e786f; }
    .portal-blue-fill { fill: #4f91b8; }
    .portal-blue-stroke { fill: none; stroke: #4f91b8; }
    .portal-orange-fill { fill: #e0a13f; }
    .portal-orange-stroke { fill: none; stroke: #e0a13f; }
    .label {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
    }
    .metric {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -1.5px;
    }
    .metric-large {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -2px;
    }
    .unit {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.2px;
    }
    .key-label {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 9px;
      font-weight: 600;
      text-anchor: middle;
    }
    .cube-line { stroke-width: 1.5; stroke-linejoin: bevel; }

    #cube-motion {
      transform-origin: 117px 130px;
    }
    .cube-solved-face { stroke: #1b1e1c; stroke-width: 0.65; stroke-linejoin: round; }
    .cube-solved-top { fill: #f5f5f0; }
    .cube-solved-left { fill: #009e60; }
    .cube-solved-right { fill: #c41e3a; }
    .cube-sticker {
      stroke: #1b1e1c;
      stroke-width: 0.65;
      stroke-linejoin: round;
    }
    .cube-colour-white { fill: #f5f5f0; }
    .cube-colour-yellow { fill: #ffd500; }
    .cube-colour-red { fill: #c41e3a; }
    .cube-colour-orange { fill: #ff6d00; }
    .cube-colour-blue { fill: #0051ba; }
    .cube-colour-green { fill: #009e60; }
    .cube-scramble-step {
      opacity: 0;
    }

    @media (prefers-reduced-motion: no-preference) {
      #cube-motion { animation: cube-solve-motion 4.8s ease-in-out 1 forwards; }
      .cube-scramble-step {
        animation-duration: 4.8s;
        animation-timing-function: steps(1, end);
        animation-iteration-count: 1;
        animation-fill-mode: both;
      }
      .solve-step-one { animation-name: solve-step-one; }
      .solve-step-two { animation-name: solve-step-two; }
      .solve-step-three { animation-name: solve-step-three; }
      .solve-step-four { animation-name: solve-step-four; }
      .key-tap { animation: key-tap 1.15s steps(1, end) 3 forwards; }
      .key-space { animation-duration: 2.2s; animation-iteration-count: 2; }
      .portal-blue-motion { animation: portal-blue-open 4.8s ease-in-out 1 forwards; }
      .portal-orange-motion { animation: portal-orange-open 4.8s ease-in-out 1 forwards; }
      .portal-blue-note { animation: portal-blue-note 4.8s ease-in-out 1 forwards; }
      .portal-orange-note { animation: portal-orange-note 4.8s ease-in-out 1 forwards; }
      .portal-replay-motion { animation: portal-replay-appear 4.8s ease-in-out 1 forwards; }
    }

    @keyframes solve-step-one { 0%, 17% { opacity: 1; } 18%, 100% { opacity: 0; } }
    @keyframes solve-step-two { 0%, 30% { opacity: 1; } 31%, 100% { opacity: 0; } }
    @keyframes solve-step-three { 0%, 43% { opacity: 1; } 44%, 100% { opacity: 0; } }
    @keyframes solve-step-four { 0%, 56% { opacity: 1; } 57%, 100% { opacity: 0; } }
    @keyframes cube-solve-motion {
      0%, 9% { opacity: 1; transform: rotate(0deg) translateY(0); }
      13% { transform: rotate(-3deg) translateY(-1px); }
      17%, 22% { transform: rotate(0deg) translateY(0); }
      27% { transform: rotate(3deg) translateY(-1px); }
      30%, 35% { transform: rotate(0deg) translateY(0); }
      40% { transform: rotate(-2deg) translateY(-1px); }
      43%, 48% { transform: rotate(0deg) translateY(0); }
      53% { transform: rotate(2deg) translateY(-1px); }
      57%, 100% { opacity: 1; transform: rotate(0deg) translateY(0); }
    }
    @keyframes key-tap {
      0%, 8% { opacity: 0.72; transform: translateY(1.8px); }
      9%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes portal-blue-open {
      0%, 7% { opacity: 0; }
      12%, 100% { opacity: 1; }
    }
    @keyframes portal-orange-open {
      0%, 15% { opacity: 0; }
      20%, 100% { opacity: 1; }
    }
    @keyframes portal-blue-note {
      0%, 7% { opacity: 0; }
      12%, 100% { opacity: 1; }
    }
    @keyframes portal-orange-note {
      0%, 15% { opacity: 0; }
      20%, 100% { opacity: 1; }
    }
    @keyframes portal-replay-appear {
      0%, 20% { opacity: 0; }
      26%, 100% { opacity: 1; }
    }
    @media (prefers-color-scheme: dark) {
      .paper { fill: #101212; }
      .grid { stroke: #252a27; }
      .panel { fill: #141716; stroke: #59605c; }
      .key { fill: #1c201e; stroke: #59605c; }
      .cube-solved-face,
      .cube-sticker { stroke: #0d0f0e; }
      .ink-fill { fill: #f0f2ef; }
      .ink-stroke { stroke: #f0f2ef; }
      .muted-fill { fill: #a4aaa6; }
      .muted-stroke { stroke: #a4aaa6; }
      .accent-fill { fill: #86a499; }
      .accent-stroke { stroke: #86a499; }
      .portal-blue-fill { fill: #72b8df; }
      .portal-blue-stroke { stroke: #72b8df; }
      .portal-orange-fill { fill: #f0b65d; }
      .portal-orange-stroke { stroke: #f0b65d; }
    }

    @media (prefers-reduced-motion: reduce) {
      #cube-motion,
      .cube-scramble-step,
      .key-tap,
      .portal-blue-motion,
      .portal-orange-motion,
      .portal-blue-note,
      .portal-orange-note,
      .portal-replay-motion {
        animation: none !important;
        transform: none !important;
      }
      .cube-scramble-step { opacity: 0 !important; }
      .portal-blue-motion,
      .portal-orange-motion,
      .portal-blue-note,
      .portal-orange-note,
      .portal-replay-motion {
        opacity: 1;
      }
    }
  </style>

  <rect class="paper" width="1280" height="260" />
  <path class="grid" d="M0 20h1280M0 52h1280M0 84h1280M0 116h1280M0 148h1280M0 180h1280M0 212h1280M0 244h1280M16 0v260M48 0v260M80 0v260M112 0v260M144 0v260M176 0v260M208 0v260M240 0v260M272 0v260M304 0v260M336 0v260M368 0v260M400 0v260M432 0v260M464 0v260M496 0v260M528 0v260M560 0v260M592 0v260M624 0v260M656 0v260M688 0v260M720 0v260M752 0v260M784 0v260M816 0v260M848 0v260M880 0v260M912 0v260M944 0v260M976 0v260M1008 0v260M1040 0v260M1072 0v260M1104 0v260M1136 0v260M1168 0v260M1200 0v260M1232 0v260M1264 0v260" />

  <g aria-hidden="true">
    <rect class="panel" x="24.5" y="24.5" width="394" height="211" />
    <rect class="panel" x="443.5" y="24.5" width="394" height="211" />
    <rect class="panel" x="862.5" y="24.5" width="394" height="211" />

