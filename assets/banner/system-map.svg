  <title id="system-map-title">Abstract system architecture map</title>
  <desc id="system-map-description">A restrained monochrome diagram of connected modules, signal paths, and a feedback loop on a technical grid.</desc>

  <defs>
    <style>
      .paper { fill: #f7f7f4; }
      .grid { fill: none; stroke: #d7d9d4; stroke-width: 1; }
      .frame { fill: none; stroke: #747875; stroke-width: 1; }
      .wash { fill: #ecece8; }
      .module { fill: #f7f7f4; stroke: #1b1d1d; stroke-width: 1.5; }
      .route { fill: none; stroke: #1b1d1d; stroke-width: 1.5; stroke-linecap: square; stroke-linejoin: miter; }
      .route-muted { fill: none; stroke: #747875; stroke-width: 1; stroke-linecap: square; stroke-linejoin: miter; }
      .node { fill: #1b1d1d; }
      .node-open { fill: #f7f7f4; stroke: #1b1d1d; stroke-width: 1.5; }
      .hairline { fill: none; stroke: #d7d9d4; stroke-width: 1; }

      @media (prefers-color-scheme: dark) {
        .paper { fill: #111313; }
        .grid { stroke: #303432; }
        .frame { stroke: #929793; }
        .wash { fill: #1a1d1c; }
