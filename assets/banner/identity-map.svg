<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="identity-map-title identity-map-description">
  <title id="identity-map-title">Gaurav Abhiman Mahajan engineering identity map</title>
  <desc id="identity-map-description">A restrained system diagram introducing Gaurav Abhiman Mahajan, known on GitHub as Gamoventure1175, as a software engineer focused on backend, systems, and data, with compact motifs for an 8.76-second speedcube personal best and typing above 90 words per minute.</desc>

  <defs>
    <style>
      .paper { fill: #0d1117; }
      .surface { fill: #161b22; }
      .grid-line { fill: none; stroke: #30363d; stroke-width: 1; opacity: 0.72; }
      .frame { fill: none; stroke: #484f58; stroke-width: 1; }
      .panel { fill: #161b22; stroke: #8b949e; stroke-width: 1; }
      .foreground { fill: #f0f6fc; }
      .muted { fill: #8b949e; }
      .signal-fill { fill: #58a6ff; }
      .route { fill: none; stroke: #f0f6fc; stroke-width: 1.5; stroke-linecap: square; stroke-linejoin: miter; }
      .route-muted { fill: none; stroke: #8b949e; stroke-width: 1; stroke-linecap: square; stroke-linejoin: miter; }
      .signal-stroke { fill: none; stroke: #58a6ff; stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter; }
      .node { fill: #f0f6fc; }
      .node-open { fill: #0d1117; stroke: #f0f6fc; stroke-width: 1.5; }
      .node-signal { fill: #0d1117; stroke: #58a6ff; stroke-width: 2; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
      .handle { font-size: 28px; font-weight: 650; letter-spacing: -0.5px; }
      .role { font-size: 16px; font-weight: 450; }
      .focus { font-size: 13px; font-weight: 650; letter-spacing: 1.5px; }
      .mark { font-size: 30px; font-weight: 700; }
      .mark-index { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; }
      .module-label { font-size: 16px; font-weight: 700; letter-spacing: 1.2px; }
      .index { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; }
      .metric { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
      .metric-label { font-size: 11px; font-weight: 650; letter-spacing: 1px; }
      .annotation { font-size: 10px; font-weight: 650; letter-spacing: 1px; }

    </style>

    <pattern id="technical-grid" width="32" height="32" patternUnits="userSpaceOnUse">
